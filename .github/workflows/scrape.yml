name: Scrape volunteer rosters

on:
  workflow_dispatch: # manual trigger only — scraping runs locally via launchd

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/volunteers.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "chore: update volunteer data $(date -u +%Y-%m-%d)"
          git push
